server:
  name: "browse-mcp"
  version: "0.1.0"
  transport:
    type: "stdio"

web:
  default_provider: "duckduckgo"
  download_dir: "/data"  # optional — restricts web_download to this directory
  providers:
    tavily:
      api_key: "$TAVILY_API_KEY"
    serper:
      api_key: "$SERPER_API_KEY"
