<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8faff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eef4ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="140" rx="12" fill="url(#bg)"/>

  <!-- Flat globe + magnifier icon -->
  <g transform="translate(72, 70)">

    <!-- Globe circle flat -->
    <circle cx="0" cy="0" r="44" fill="#2563eb"/>

    <!-- Latitude lines (flat, just strokes) -->
    <line x1="-44" y1="0" x2="44" y2="0" stroke="white" stroke-width="1.5" opacity="0.35"/>
    <ellipse cx="0" cy="0" rx="44" ry="17" fill="none" stroke="white" stroke-width="1.5" opacity="0.35"/>

    <!-- Longitude curves -->
    <ellipse cx="0" cy="0" rx="17" ry="44" fill="none" stroke="white" stroke-width="1.5" opacity="0.35"/>

    <!-- Magnifier over globe, flat style -->
    <circle cx="13" cy="-11" r="14" fill="none" stroke="white" stroke-width="4"/>
    <line x1="22" y1="-1" x2="32" y2="9" stroke="white" stroke-width="4" stroke-linecap="round"/>

  </g>

  <!-- Title -->
  <text x="150" y="60" font-family="'Segoe UI', system-ui, sans-serif" font-size="46" font-weight="800" fill="#111827" letter-spacing="-1">Web</text>
  <text x="222" y="60" font-family="'Segoe UI', system-ui, sans-serif" font-size="46" font-weight="800" fill="#2563eb" letter-spacing="-1"> MCP</text>

  <!-- Tagline -->
  <text x="152" y="92" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" fill="#6b7280" letter-spacing="0.1">Search, fetch and download from the web. Right from your AI.</text>

</svg>
