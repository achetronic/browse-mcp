<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f3c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="140" rx="12" fill="url(#bg)"/>

  <!-- Browser window icon -->
  <g transform="translate(40, 10)">

    <!-- Main window frame -->
    <rect x="0" y="0" width="120" height="120" rx="6" fill="#e0f7fa" stroke="#80deea" stroke-width="1.5"/>

    <!-- Tab bar background -->
    <rect x="0" y="0" width="120" height="22" rx="6" fill="#b2ebf2"/>
    <rect x="0" y="16" width="120" height="6" fill="#b2ebf2"/>

    <!-- Active tab -->
    <path d="M6 22 L6 8 Q6 4 10 4 L58 4 Q62 4 62 8 L62 22 Z" fill="#e0f7fa"/>
    <circle cx="15" cy="13" r="3.5" fill="#0891b2" opacity="0.9"/>
    <rect x="23" y="10" width="28" height="5" rx="2" fill="#80deea"/>

    <!-- Toolbar -->
    <rect x="0" y="20" width="120" height="22" fill="#cceef5"/>

    <!-- Nav buttons -->
    <text x="8" y="35" font-family="system-ui" font-size="13" fill="#0e7490">‹</text>
    <text x="18" y="35" font-family="system-ui" font-size="13" fill="#0e7490">›</text>
    <text x="28" y="35" font-family="system-ui" font-size="11" fill="#0e7490">↻</text>

    <!-- URL bar -->
    <rect x="44" y="24" width="68" height="14" rx="7" fill="white" stroke="#80deea" stroke-width="1.5"/>
    <rect x="49" y="28" width="4" height="5" rx="1" fill="#0e7490"/>
    <path d="M49.5 29.5 Q51 27 52.5 29.5" fill="none" stroke="#0e7490" stroke-width="1.2"/>
    <rect x="56" y="30" width="44" height="3" rx="1.5" fill="#0e7490" opacity="0.3"/>

    <!-- Page content -->
    <rect x="8" y="50" width="104" height="6" rx="3" fill="#06b6d4" opacity="0.7"/>
    <rect x="8" y="62" width="80" height="4" rx="2" fill="#b2ebf2"/>
    <rect x="8" y="71" width="96" height="4" rx="2" fill="#b2ebf2"/>
    <rect x="8" y="80" width="64" height="4" rx="2" fill="#b2ebf2"/>

  </g>

  <!-- Title -->
  <text x="186" y="60" font-family="'Segoe UI', system-ui, sans-serif" font-size="42" font-weight="600" letter-spacing="1">
    <tspan fill="white">Browse</tspan><tspan fill="#22d3ee" dx="10">MCP</tspan>
  </text>

  <!-- Tagline -->
  <text x="188" y="92" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" fill="#64748b" letter-spacing="0.1">Search, fetch and download from the web. Right from your AI.</text>

</svg>
