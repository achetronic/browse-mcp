<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8faff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eef4ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="140" rx="12" fill="url(#bg)"/>

  <!-- Browser window -->
  <g transform="translate(22, 14)">

    <!-- Window frame -->
    <rect x="0" y="0" width="96" height="112" rx="8" fill="#2563eb"/>

    <!-- Toolbar background -->
    <rect x="0" y="0" width="96" height="28" rx="8" fill="#1d4ed8"/>
    <rect x="0" y="20" width="96" height="8" fill="#1d4ed8"/>

    <!-- Traffic lights -->
    <circle cx="14" cy="14" r="4.5" fill="#ef4444"/>
    <circle cx="27" cy="14" r="4.5" fill="#f59e0b"/>
    <circle cx="40" cy="14" r="4.5" fill="#22c55e"/>

    <!-- URL bar -->
    <rect x="52" y="7" width="36" height="14" rx="4" fill="white" opacity="0.2"/>

    <!-- Page content lines (flat, abstract) -->
    <rect x="10" y="36" width="76" height="6" rx="3" fill="white" opacity="0.3"/>
    <rect x="10" y="48" width="60" height="6" rx="3" fill="white" opacity="0.2"/>
    <rect x="10" y="60" width="68" height="6" rx="3" fill="white" opacity="0.2"/>
    <rect x="10" y="76" width="76" height="20" rx="4" fill="white" opacity="0.15"/>
    <rect x="10" y="102" width="40" height="6" rx="3" fill="white" opacity="0.15"/>

  </g>

  <!-- Title -->
  <text x="140" y="60" font-family="'Segoe UI', system-ui, sans-serif" font-size="46" font-weight="800" fill="#111827" letter-spacing="-1">Web</text>
  <text x="212" y="60" font-family="'Segoe UI', system-ui, sans-serif" font-size="46" font-weight="800" fill="#2563eb" letter-spacing="-1"> MCP</text>

  <!-- Tagline -->
  <text x="142" y="92" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" fill="#6b7280" letter-spacing="0.1">Search, fetch and download from the web. Right from your AI.</text>

</svg>
