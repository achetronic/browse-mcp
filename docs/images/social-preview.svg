<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f3c;stop-opacity:1" />
    </linearGradient>
    <!-- Subtle radial glow behind browser -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0" />
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Glow behind browser -->
  <ellipse cx="340" cy="320" rx="300" ry="260" fill="url(#glow)"/>

  <!-- Browser window — scaled up for social preview -->
  <g transform="translate(100, 80)">

    <!-- Shadow -->
    <rect x="6" y="6" width="480" height="480" rx="14" fill="black" opacity="0.35"/>

    <!-- Main frame -->
    <rect x="0" y="0" width="480" height="480" rx="14" fill="#f8fafc"/>

    <!-- Tab bar -->
    <rect x="0" y="0" width="480" height="56" rx="14" fill="#94a3b8"/>
    <rect x="0" y="42" width="480" height="14" fill="#94a3b8"/>

    <!-- Active tab -->
    <path d="M16 56 L16 20 Q16 10 26 10 L232 10 Q242 10 242 20 L242 56 Z" fill="#f8fafc"/>
    <circle cx="38" cy="33" r="9" fill="#22d3ee"/>
    <rect x="56" y="28" width="120" height="10" rx="5" fill="#64748b"/>

    <!-- Toolbar -->
    <rect x="0" y="54" width="480" height="54" fill="#e2e8f0"/>

    <!-- Nav buttons -->
    <text x="18" y="90" font-family="system-ui" font-size="32" fill="#64748b">‹</text>
    <text x="48" y="90" font-family="system-ui" font-size="32" fill="#64748b">›</text>
    <text x="80" y="88" font-family="system-ui" font-size="26" fill="#64748b">↻</text>

    <!-- URL bar -->
    <rect x="116" y="64" width="340" height="34" rx="17" fill="white" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="130" y="74" width="10" height="14" rx="2" fill="#64748b"/>
    <path d="M130 78 Q136 70 142 78" fill="none" stroke="#64748b" stroke-width="2.5"/>
    <rect x="148" y="79" width="180" height="7" rx="3" fill="#64748b" opacity="0.4"/>

    <!-- Page content -->
    <rect x="40" y="138" width="400" height="14" rx="5" fill="#22d3ee" opacity="0.5"/>
    <rect x="40" y="164" width="320" height="10" rx="4" fill="#cbd5e1" opacity="0.7"/>
    <rect x="40" y="186" width="380" height="10" rx="4" fill="#cbd5e1" opacity="0.5"/>
    <rect x="40" y="208" width="260" height="10" rx="4" fill="#cbd5e1" opacity="0.4"/>

    <rect x="40" y="240" width="180" height="60" rx="8" fill="#e0f9ff" opacity="0.8"/>
    <rect x="240" y="240" width="200" height="60" rx="8" fill="#22d3ee" opacity="0.25"/>

    <rect x="40" y="320" width="400" height="10" rx="4" fill="#cbd5e1" opacity="0.3"/>
    <rect x="40" y="340" width="300" height="10" rx="4" fill="#cbd5e1" opacity="0.2"/>

  </g>

  <!-- Title -->
  <text x="660" y="240" font-family="'Segoe UI', system-ui, sans-serif" font-size="96" font-weight="700" letter-spacing="-2">
    <tspan fill="white">Browse</tspan>
  </text>
  <text x="660" y="340" font-family="'Segoe UI', system-ui, sans-serif" font-size="96" font-weight="700" fill="#22d3ee" letter-spacing="-2">MCP</text>

  <!-- Tagline -->
  <text x="662" y="400" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" fill="#94a3b8" letter-spacing="0.3">Search, fetch and download from the web.</text>
  <text x="662" y="438" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" fill="#94a3b8" letter-spacing="0.3">Right from your AI.</text>

  <!-- Pills -->
  <rect x="662" y="480" width="130" height="36" rx="18" fill="#22d3ee" opacity="0.12"/>
  <text x="727" y="504" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#22d3ee" text-anchor="middle" font-weight="600">Go 1.24+</text>

  <rect x="806" y="480" width="175" height="36" rx="18" fill="#22d3ee" opacity="0.12"/>
  <text x="893" y="504" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#22d3ee" text-anchor="middle" font-weight="600">No API key</text>

  <rect x="995" y="480" width="160" height="36" rx="18" fill="#22d3ee" opacity="0.12"/>
  <text x="1075" y="504" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#22d3ee" text-anchor="middle" font-weight="600">JWT + RBAC</text>

  <!-- Decorative dots -->
  <circle cx="1220" cy="80" r="120" fill="#22d3ee" opacity="0.03"/>
  <circle cx="1260" cy="580" r="80" fill="#22d3ee" opacity="0.04"/>

</svg>
