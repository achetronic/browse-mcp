<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f3c;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0" />
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Glow behind browser -->
  <ellipse cx="300" cy="320" rx="320" ry="280" fill="url(#glow)"/>

  <!-- Browser window — same as header.svg but scaled 4x via transform -->
  <g transform="translate(60, 80) scale(4)">

    <!-- Shadow -->
    <rect x="2" y="2" width="120" height="120" rx="6" fill="black" opacity="0.3"/>

    <!-- Main frame -->
    <rect x="0" y="0" width="120" height="120" rx="6" fill="#f8fafc"/>

    <!-- Tab bar -->
    <rect x="0" y="0" width="120" height="22" rx="6" fill="#94a3b8"/>
    <rect x="0" y="16" width="120" height="6" fill="#94a3b8"/>

    <!-- Active tab -->
    <path d="M6 22 L6 8 Q6 4 10 4 L58 4 Q62 4 62 8 L62 22 Z" fill="#f8fafc"/>
    <circle cx="15" cy="13" r="3.5" fill="#22d3ee"/>
    <rect x="23" y="10" width="28" height="4" rx="2" fill="#64748b"/>

    <!-- Toolbar -->
    <rect x="0" y="20" width="120" height="22" fill="#e2e8f0"/>

    <!-- Nav buttons -->
    <text x="8" y="35" font-family="system-ui" font-size="13" fill="#64748b">‹</text>
    <text x="18" y="35" font-family="system-ui" font-size="13" fill="#64748b">›</text>
    <text x="28" y="35" font-family="system-ui" font-size="11" fill="#64748b">↻</text>

    <!-- URL bar -->
    <rect x="44" y="24" width="68" height="14" rx="7" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="49" y="30" width="55" height="3" rx="1.5" fill="#64748b" opacity="0.5"/>

    <!-- Page content -->
    <rect x="16" y="52" width="88" height="4" rx="2" fill="#22d3ee" opacity="0.5"/>
    <rect x="16" y="63" width="68" height="3" rx="1.5" fill="#cbd5e1" opacity="0.7"/>
    <rect x="16" y="72" width="80" height="3" rx="1.5" fill="#cbd5e1" opacity="0.5"/>
    <rect x="16" y="81" width="54" height="3" rx="1.5" fill="#cbd5e1" opacity="0.4"/>

  </g>

  <!-- Title -->
  <text x="660" y="230" font-family="'Segoe UI', system-ui, sans-serif" font-size="96" font-weight="700" letter-spacing="-2">
    <tspan fill="white">Browse</tspan>
  </text>
  <text x="660" y="330" font-family="'Segoe UI', system-ui, sans-serif" font-size="96" font-weight="700" fill="#22d3ee" letter-spacing="-2">MCP</text>

  <!-- Tagline -->
  <text x="662" y="390" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" fill="#94a3b8" letter-spacing="0.3">Search, fetch and download from the web.</text>
  <text x="662" y="428" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" fill="#94a3b8" letter-spacing="0.3">Right from your AI.</text>

  <!-- Pills -->
  <rect x="662" y="470" width="130" height="36" rx="18" fill="#22d3ee" opacity="0.12"/>
  <text x="727" y="494" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#22d3ee" text-anchor="middle" font-weight="600">Go 1.24+</text>

  <rect x="806" y="470" width="175" height="36" rx="18" fill="#22d3ee" opacity="0.12"/>
  <text x="893" y="494" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#22d3ee" text-anchor="middle" font-weight="600">No API key</text>

  <rect x="995" y="470" width="160" height="36" rx="18" fill="#22d3ee" opacity="0.12"/>
  <text x="1075" y="494" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#22d3ee" text-anchor="middle" font-weight="600">JWT + RBAC</text>

  <!-- Decorative dots -->
  <circle cx="1220" cy="80" r="120" fill="#22d3ee" opacity="0.03"/>
  <circle cx="1260" cy="580" r="80" fill="#22d3ee" opacity="0.04"/>

</svg>
